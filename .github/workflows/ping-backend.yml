name: Ping Backend

on:
  schedule:
    - cron: "*/12 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend health endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret is not set."
            exit 1
          fi

          curl -fsSL \
            --connect-timeout 10 \
            --max-time 60 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 5 \
            "$BACKEND_URL/api/health"
